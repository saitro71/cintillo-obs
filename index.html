<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cintillo de Noticias</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
        }
        .ticker-wrap {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
            box-sizing: border-box;
            white-space: nowrap;
        }
        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: ticker 30s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker" id="noticias">Conectando con el servidor de noticias...</div>
</div>

<script>
    // Le pedimos a Google News que busque solo en el sitio de Imagen Zacatecas
    const googleNewsRss = 'https://news.google.com/rss/search?q=site:imagenzac.com.mx&hl=es-419&gl=MX&ceid=MX:es-419';
    // Pasamos ese RSS infalible por nuestro conversor
    const rssApiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(googleNewsRss)}`;

    function cargarNoticias() {
        fetch(rssApiUrl)
            .then(response => {
                if (!response.ok) throw new Error('Error de conexión con Google News');
                return response.json();
            })
            .then(data => {
                if (data.status === 'ok' && data.items.length > 0) {
                    let titulos = [];
                    data.items.forEach(item => {
                        // Limpiamos el texto porque Google a veces le agrega " - Imagen Zacatecas" al final del título
                        let tituloLimpio = item.title.replace(' - Imagen Zacatecas', '').trim();
                        titulos.push(tituloLimpio);
                    });
                    
                    const separador = " &nbsp;&nbsp;&nbsp; | &nbsp;&nbsp;&nbsp; ";
                    document.getElementById('noticias').innerHTML = titulos.join(separador) + separador;
                } else {
                    document.getElementById('noticias').innerHTML = "Esperando titulares recientes...";
                }
            })
            .catch(error => {
                document.getElementById('noticias').innerHTML = "Reconectando sistema de noticias... ";
                console.error(error);
            });
    }

    // Carga inicial y actualización automática cada 5 minutos
    cargarNoticias();
    setInterval(cargarNoticias, 300000);
</script>

</body>
</html>
