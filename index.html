<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cintillo de Noticias - RSS Público</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
        }
        .ticker-wrap {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
            box-sizing: border-box;
            display: flex;
            white-space: nowrap;
            overflow: hidden;
        }
        .ticker {
            flex-shrink: 0;
            padding-right: 50px;
            animation: ticker 100s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker" id="noticias">Sincronizando notas...</div>
    <div class="ticker" id="noticias2">Sincronizando notas...</div>
</div>

<script>
    // Usamos el canal de datos público de WordPress que no requiere permisos CORS de TI
    const rssFeedOficial = 'https://imagenzac.com.mx/feed/';
    const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssFeedOficial)}`;

    function cargarNoticias() {
        fetch(proxyUrl)
            .then(response => {
                if (!response.ok) throw new Error('Error al conectar con el Feed RSS');
                return response.json();
            })
            .then(data => {
                if (data.status === 'ok' && data.items.length > 0) {
                    let titulos = [];
                    data.items.forEach(item => {
                        let titulo = item.title;
                        
                        // Limpiamos la etiqueta de "El Runrún" para que las notas luzcan limpias en pantalla
                        titulo = titulo.replace(/^El [Rr]unr[úu]n:\s*/i, '');
                        
                        titulos.push(titulo.trim());
                    });
                    
                    const separador = " &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    const textoFinal = titulos.join(separador) + separador;
                    
                    document.getElementById('noticias').innerHTML = textoFinal;
                    document.getElementById('noticias2').innerHTML = textoFinal;
                } else {
                    document.getElementById('noticias').innerHTML = "Esperando actualización de notas en el servidor...";
                    document.getElementById('noticias2').innerHTML = "Esperando actualización de notas en el servidor...";
                }
            })
            .catch(error => {
                console.error('Error de red:', error);
                document.getElementById('noticias').innerHTML = "Sincronizando con el servidor... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                document.getElementById('noticias2').innerHTML = "Sincronizando con el servidor... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
            });
    }

    // Ejecuta al cargar la fuente en OBS y luego se refresca solo cada 5 minutos
    cargarNoticias();
    setInterval(cargarNoticias, 300000);
</script>

</body>
</html>
