<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cintillo de Noticias - Versión Final 30min</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* Mantenemos el fondo del documento transparente para OBS */
            color: #1a1a1a; /* Texto en negro casi puro para máxima legibilidad */
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
        }
        .ticker-wrap {
            width: 100%;
            background-color: white; /* AQUÍ CAMBIAMOS EL FONDO A BLANCO */
            padding: 10px 0;
            box-sizing: border-box;
            display: flex;
            white-space: nowrap;
            overflow: hidden;
            /* Pequeña sombra interna para que se vea más profesional */
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.1);
            border-top: 1px solid #ddd;
        }
        .ticker {
            flex-shrink: 0;
            padding-right: 50px;
            /* Tu velocidad personalizada a 400s */
            animation: ticker 400s linear infinite; 
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker" id="noticias">Sincronizando...</div>
    <div class="ticker" id="noticias2">Sincronizando...</div>
</div>

<script>
    // 1. RECUPERACIÓN INSTANTÁNEA (El Anti-Parpadeo)
    // Al cargar la página (después de un Hard Reset de OBS), leemos el "disco duro" interno
    const noticiasGuardadas = localStorage.getItem('backup_cintillo');
    
    if (noticiasGuardadas) {
        // Si ya había noticias guardadas de la sesión anterior, las pintamos inmediatamente.
        // ¡Nadie verá nunca el mensaje de "Sincronizando"!
        document.getElementById('noticias').innerHTML = noticiasGuardadas;
        document.getElementById('noticias2').innerHTML = noticiasGuardadas;
    } else {
        // Esto solo se verá la primera vez en la historia que abras el archivo
        document.getElementById('noticias').innerHTML = "CARGANDO NOTICIAS... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp;";
        document.getElementById('noticias2').innerHTML = "CARGANDO NOTICIAS... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp;";
    }

    // 2. LA FUNCIÓN DE DESCARGA
    function cargarNoticias() {
        const timestamp = new Date().getTime();
        const urlRSSOficial = 'https://imagenzac.com.mx/rss-ultimas-noticias.xml?nocache=' + timestamp;
        const rssApiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(urlRSSOficial)}`;

        fetch(rssApiUrl)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'ok' && data.items.length > 0) {
                    let titulos = [];
                    data.items.forEach(item => {
                        let titulo = item.title.replace(/^El [Rr]unr[úu]n:\s*/i, '');
                        titulos.push(titulo.trim());
                    });
                    
                    const separador = " &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    const textoFinal = titulos.join(separador) + separador;
                    
                    // Comparamos: Si hubo notas nuevas, actualizamos la pantalla y guardamos en la bóveda
                    if (textoFinal !== noticiasGuardadas) {
                        document.getElementById('noticias').innerHTML = textoFinal;
                        document.getElementById('noticias2').innerHTML = textoFinal;
                        
                        // Guardamos el nuevo texto en el almacenamiento permanente de OBS
                        localStorage.setItem('backup_cintillo', textoFinal); 
                    }
                }
            })
            .catch(error => console.error('Error al actualizar:', error));
    }

    // 3. Ejecutamos la búsqueda silenciosa en segundo plano
    cargarNoticias();
</script>
</body>
</html>
