<script>
    // PEGA AQUÍ LA URL QUE TE DIO GOOGLE APPS SCRIPT
    const googleProxyUrl = 'https://script.google.com/macros/s/TU_URL_AQUI/exec';

    function cargarNoticias() {
        fetch(googleProxyUrl)
            .then(response => {
                if (!response.ok) throw new Error('Error al conectar con Google Script');
                return response.text();
            })
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Usamos tu selector original que lee la página en el orden cronológico exacto
                const elementos = doc.querySelectorAll('h2.ee-post__title__heading');
                
                let titulos = [];
                elementos.forEach(el => {
                    const texto = el.textContent.trim();
                    if(texto !== '' && !titulos.includes(texto)) {
                        titulos.push(texto);
                    }
                });

                if (titulos.length > 0) {
                    const separador = " &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    const textoFinal = titulos.join(separador) + separador;
                    
                    document.getElementById('noticias').innerHTML = textoFinal;
                    document.getElementById('noticias2').innerHTML = textoFinal;
                } else {
                    document.getElementById('noticias').innerHTML = "No se encontraron los títulos en el HTML.";
                    document.getElementById('noticias2').innerHTML = "No se encontraron los títulos en el HTML.";
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('noticias').innerHTML = "Sincronizando conexión segura... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                document.getElementById('noticias2').innerHTML = "Sincronizando conexión segura... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
            });
    }

    cargarNoticias();
    setInterval(cargarNoticias, 300000);
</script>
