<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cintillo de Noticias</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
        }
        .ticker-wrap {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
            box-sizing: border-box;
            display: flex;
            white-space: nowrap;
            overflow: hidden;
        }
        .ticker {
            flex-shrink: 0;
            padding-right: 50px;
            /* Aquí controlas la velocidad. Si lo quieres más lento, sube de 100s a 150s */
            animation: ticker 100s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker" id="noticias">Cargando noticias...</div>
    <div class="ticker" id="noticias2">Cargando noticias...</div>
</div>

<script>
    // Tu enlace de Google News convertido a formato RSS agregando "/rss/"
    const googleNewsRss = 'https://news.google.com/rss/publications/CAAqLAgKIiZDQklTRmdnTWFoSUtFR2x0WVdkbGJucGhZeTVqYjIwdWJYZ29BQVAB?hl=es-419&gl=MX&ceid=MX:es-419';
    const rssApiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(googleNewsRss)}`;

    function cargarNoticias() {
        fetch(rssApiUrl)
            .then(response => {
                if (!response.ok) throw new Error('Error en la red');
                return response.json();
            })
            .then(data => {
                if (data.status === 'ok' && data.items.length > 0) {
                    let titulos = [];
                    data.items.forEach(item => {
                        let titulo = item.title;
                        
                        // Filtro 1: Quitamos la firma del periódico que pone Google
                        titulo = titulo.replace(' - Imagen Zacatecas', '');
                        
                        // Filtro 2: Limpiamos la etiqueta de "El Runrún" si aparece
                        titulo = titulo.replace(/^El [Rr]unr[úu]n:\s*/i, '');
                        
                        titulos.push(titulo.trim());
                    });
                    
                    const separador = " &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    const textoFinal = titulos.join(separador) + separador;
                    
                    // Inyectamos el texto en los dos contenedores
                    document.getElementById('noticias').innerHTML = textoFinal;
                    document.getElementById('noticias2').innerHTML = textoFinal;
                }
            })
            .catch(error => console.error('Error al cargar noticias:', error));
    }

    cargarNoticias();
    setInterval(cargarNoticias, 300000);
</script>

</body>
</html>
