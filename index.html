<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cintillo de Noticias - Versión Final 30min</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* Mantenemos el fondo del documento transparente para OBS */
            color: #1a1a1a; /* Texto en negro casi puro para máxima legibilidad */
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
        }
        .ticker-wrap {
            width: 100%;
            background-color: white; /* AQUÍ CAMBIAMOS EL FONDO A BLANCO */
            padding: 10px 0;
            box-sizing: border-box;
            display: flex;
            white-space: nowrap;
            overflow: hidden;
            /* Pequeña sombra interna para que se vea más profesional */
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.1);
            border-top: 1px solid #ddd;
        }
        .ticker {
            flex-shrink: 0;
            padding-right: 50px;
            /* Tu velocidad personalizada a 400s */
            animation: ticker 400s linear infinite; 
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker" id="noticias">Sincronizando...</div>
    <div class="ticker" id="noticias2">Sincronizando...</div>
</div>

<script>
    function cargarNoticias() {
        // El "Rompedor de Caché" para asegurar que leemos datos frescos del servidor
        const timestamp = new Date().getTime();
        const urlRSSOficial = 'https://imagenzac.com.mx/rss-ultimas-noticias.xml?nocache=' + timestamp;
        
        // Conversor a JSON
        const rssApiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(urlRSSOficial)}`;

        fetch(rssApiUrl)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'ok' && data.items.length > 0) {
                    let titulos = [];
                    data.items.forEach(item => {
                        let titulo = item.title;
                        // Limpiamos la etiqueta del Runrún
                        titulo = titulo.replace(/^El [Rr]unr[úu]n:\s*/i, '');
                        titulos.push(titulo.trim());
                    });
                    
                    const separador = " &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    const textoFinal = titulos.join(separador) + separador;
                    
                    document.getElementById('noticias').innerHTML = textoFinal;
                    document.getElementById('noticias2').innerHTML = textoFinal;
                    
                    // Registro técnico en consola
                    console.log("Cintillo actualizado correctamente: " + new Date().toLocaleTimeString());
                }
            })
            .catch(error => console.error('Error al cargar noticias:', error));
    }

    // Ejecución inicial al abrir OBS
    cargarNoticias();
    
    // Intervalo de actualización optimizado a 30 minutos (1,800,000 milisegundos)
    setInterval(cargarNoticias, 1800000);
</script>
</body>
</html>
