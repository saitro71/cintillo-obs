<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cintillo de Noticias - Proxy Privado</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
        }
        .ticker-wrap {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
            box-sizing: border-box;
            display: flex;
            white-space: nowrap;
            overflow: hidden;
        }
        .ticker {
            flex-shrink: 0;
            padding-right: 50px;
            animation: ticker 100s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker" id="noticias">Conectando con el servidor seguro...</div>
    <div class="ticker" id="noticias2">Conectando con el servidor seguro...</div>
</div>

<script>
    // Tu enlace privado de Google Apps Script
    const googleProxyUrl = 'https://script.google.com/macros/s/AKfycbzJ9mtB8xuxyZDnNJfmwNCp77uso5_GlYoaS8Ux3n1g97RgcVyad4-ks4-Q87sFY4y0/exec';

    function cargarNoticias() {
        fetch(googleProxyUrl)
            .then(response => {
                if (!response.ok) throw new Error('Error al conectar con Google Script');
                return response.text();
            })
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Usamos tu selector original que lee la página en el orden cronológico exacto
                const elementos = doc.querySelectorAll('h2.ee-post__title__heading');
                
                let titulos = [];
                elementos.forEach(el => {
                    const texto = el.textContent.trim();
                    if(texto !== '' && !titulos.includes(texto)) {
                        titulos.push(texto);
                    }
                });

                if (titulos.length > 0) {
                    const separador = " &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    const textoFinal = titulos.join(separador) + separador;
                    
                    document.getElementById('noticias').innerHTML = textoFinal;
                    document.getElementById('noticias2').innerHTML = textoFinal;
                } else {
                    // Si el HTML viene vacío, indicará este error
                    document.getElementById('noticias').innerHTML = "No se encontraron los títulos en el código fuente. &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    document.getElementById('noticias2').innerHTML = "No se encontraron los títulos en el código fuente. &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('noticias').innerHTML = "Sincronizando conexión... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                document.getElementById('noticias2').innerHTML = "Sincronizando conexión... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
            });
    }

    // Ejecuta al cargar y se actualiza en segundo plano cada 5 minutos
    cargarNoticias();
    setInterval(cargarNoticias, 300000);
</script>

</body>
</html>
