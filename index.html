<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cintillo de Noticias</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* Fondo transparente para OBS */
            color: white;
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
        }
        .ticker-wrap {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
            box-sizing: border-box;
            display: flex;
            white-space: nowrap;
            overflow: hidden;
        }
        .ticker {
            flex-shrink: 0;
            padding-right: 50px; /* Espacio antes de que empiece la repetición */
            animation: ticker 100s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker" id="noticias">Cargando noticias de Última Hora...</div>
    <div class="ticker" id="noticias2">Cargando noticias de Última Hora...</div>
</div>

<script>
    const urlNoticias = 'https://imagenzac.com.mx/ultima-hora';
    // Cambiamos a un proxy distinto, menos detectado por los firewalls
    const proxyUrl = `https://api.codetabs.com/v1/proxy/?quest=${urlNoticias}`;

    function cargarNoticias() {
        fetch(proxyUrl)
            .then(response => {
                if (!response.ok) throw new Error('Bloqueo de red');
                return response.text();
            })
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Selector más flexible (quitamos el h2 inicial) por si el cortafuegos alteró un poco el HTML
                const elementos = doc.querySelectorAll('.ee-post__title__heading, .ee-post__title');
                
                let titulos = [];
                elementos.forEach(el => {
                    const texto = el.textContent.trim();
                    // Evitamos títulos vacíos o noticias duplicadas
                    if(texto !== '' && !titulos.includes(texto)) {
                        titulos.push(texto);
                    }
                });

                if (titulos.length > 0) {
                    const separador = " &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    const textoFinal = titulos.join(separador) + separador;
                    
                    document.getElementById('noticias').innerHTML = textoFinal;
                    document.getElementById('noticias2').innerHTML = textoFinal;
                } else {
                    // "El chivato": Si vuelve a fallar, imprimimos el título de la página de error
                    const tituloPagina = doc.title || "Página sin título";
                    const errorMsg = "Bloqueo de seguridad activo. El servidor web respondió con: " + tituloPagina + " &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    document.getElementById('noticias').innerHTML = errorMsg;
                    document.getElementById('noticias2').innerHTML = errorMsg;
                }
            })
            .catch(error => {
                console.error(error);
                document.getElementById('noticias').innerHTML = "Reconectando proxy alternativo... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                document.getElementById('noticias2').innerHTML = "Reconectando proxy alternativo... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
            });
    }

    cargarNoticias();
    setInterval(cargarNoticias, 300000);
</script>

</body>
</html>
