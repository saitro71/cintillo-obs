<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cintillo de Noticias</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
        }
        .ticker-wrap {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
            box-sizing: border-box;
            white-space: nowrap;
        }
        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: ticker 30s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker" id="noticias">Cargando conexión...</div>
</div>

<script>
    const urlNoticias = 'https://imagenzac.com.mx/ultima-hora';
    // Usamos la versión 'raw' del proxy para obtener el HTML directo
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(urlNoticias)}`;

    function cargarNoticias() {
        fetch(proxyUrl)
            .then(response => {
                if (!response.ok) throw new Error('El servidor rechazó la conexión');
                return response.text(); // Extraemos el HTML crudo
            })
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Buscamos los títulos usando tu selector
                const elementos = doc.querySelectorAll('h2.ee-post__title__heading');
                
                let titulos = [];
                elementos.forEach(el => {
                    if(el.textContent.trim() !== '') {
                        titulos.push(el.textContent.trim());
                    }
                });

                if (titulos.length > 0) {
                    const separador = " &nbsp;&nbsp;&nbsp; | &nbsp;&nbsp;&nbsp; ";
                    document.getElementById('noticias').innerHTML = titulos.join(separador) + separador;
                } else {
                    document.getElementById('noticias').innerHTML = "Error: No se encontraron los títulos (Quizá cambió el diseño de la web).";
                }
            })
            .catch(error => {
                document.getElementById('noticias').innerHTML = "Fallo de red: " + error.message;
            });
    }

    // Cargar al inicio y actualizar cada 5 minutos
    cargarNoticias();
    setInterval(cargarNoticias, 300000);
</script>

</body>
</html>
