<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cintillo de Noticias - WP API</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
        }
        .ticker-wrap {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
            box-sizing: border-box;
            display: flex;
            white-space: nowrap;
            overflow: hidden;
        }
        .ticker {
            flex-shrink: 0;
            padding-right: 50px;
            animation: ticker 100s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker" id="noticias">Extrayendo datos directos...</div>
    <div class="ticker" id="noticias2">Extrayendo datos directos...</div>
</div>

<script>
    // PEGA AQUÍ TU NUEVO ENLACE DE GOOGLE SCRIPT (Asegúrate de que sea el nuevo de la "Nueva Implementación")
    const googleProxyUrl = 'https://script.google.com/macros/s/TU_NUEVA_URL_AQUI/exec';

    function cargarNoticias() {
        fetch(googleProxyUrl)
            .then(response => {
                if (!response.ok) throw new Error('Error al conectar con la API de Google');
                return response.json(); // Ahora leemos datos puros, no HTML
            })
            .then(posts => {
                // Verificamos que la API sí nos haya devuelto un arreglo de noticias
                if (Array.isArray(posts) && posts.length > 0) {
                    let titulos = [];
                    
                    posts.forEach(post => {
                        // Limpiamos los caracteres especiales (como acentos o comillas que WP manda codificados)
                        let doc = new DOMParser().parseFromString(post.title.rendered, "text/html");
                        let tituloLimpio = doc.documentElement.textContent;
                        
                        // Opcional: quitamos "El Runrún:" si aparece
                        tituloLimpio = tituloLimpio.replace(/^El [Rr]unr[úu]n:\s*/i, '');
                        
                        titulos.push(tituloLimpio.trim());
                    });

                    const separador = " &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    const textoFinal = titulos.join(separador) + separador;
                    
                    document.getElementById('noticias').innerHTML = textoFinal;
                    document.getElementById('noticias2').innerHTML = textoFinal;
                } else {
                    document.getElementById('noticias').innerHTML = "La base de datos devolvió un registro vacío. &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    document.getElementById('noticias2').innerHTML = "La base de datos devolvió un registro vacío. &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                }
            })
            .catch(error => {
                console.error('Error de red:', error);
                document.getElementById('noticias').innerHTML = "Sincronizando con base de datos... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                document.getElementById('noticias2').innerHTML = "Sincronizando con base de datos... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
            });
    }

    cargarNoticias();
    setInterval(cargarNoticias, 300000);
</script>

</body>
</html>
