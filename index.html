<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cintillo de Noticias - Conexión Directa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
        }
        .ticker-wrap {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
            box-sizing: border-box;
            display: flex;
            white-space: nowrap;
            overflow: hidden;
        }
        .ticker {
            flex-shrink: 0;
            padding-right: 50px;
            animation: ticker 100s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker" id="noticias">Conectando con Imagen Zacatecas...</div>
    <div class="ticker" id="noticias2">Conectando con Imagen Zacatecas...</div>
</div>

<script>
    // URL directa esperando la autorización CORS del equipo web
    const urlNoticias = 'https://imagenzac.com.mx/ultima-hora';

    function cargarNoticias() {
        fetch(urlNoticias)
            .then(response => {
                if (!response.ok) throw new Error('Error al conectar con la página');
                return response.text();
            })
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Tu selector CSS original exacto
                const elementos = doc.querySelectorAll('h2.ee-post__title__heading');
                
                let titulos = [];
                elementos.forEach(el => {
                    const texto = el.textContent.trim();
                    if(texto !== '' && !titulos.includes(texto)) {
                        titulos.push(texto);
                    }
                });

                if (titulos.length > 0) {
                    const separador = " &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    const textoFinal = titulos.join(separador) + separador;
                    
                    document.getElementById('noticias').innerHTML = textoFinal;
                    document.getElementById('noticias2').innerHTML = textoFinal;
                } else {
                    document.getElementById('noticias').innerHTML = "Cargando titulares... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                    document.getElementById('noticias2').innerHTML = "Cargando titulares... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                }
            })
            .catch(error => {
                console.error('Error de red o bloqueo CORS activo:', error);
                document.getElementById('noticias').innerHTML = "Esperando autorización del servidor... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
                document.getElementById('noticias2').innerHTML = "Esperando autorización del servidor... &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ";
            });
    }

    cargarNoticias();
    setInterval(cargarNoticias, 300000);
</script>

</body>
</html>
