<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cintillo de Noticias</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
        }
        .ticker-wrap {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
            box-sizing: border-box;
            white-space: nowrap;
        }
        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: ticker 30s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker" id="noticias">Conectando con el servidor de noticias...</div>
</div>

<script>
    // Apuntamos directamente al Feed RSS de Imagen Zacatecas convertido a JSON
    const rssApiUrl = 'https://api.rss2json.com/v1/api.json?rss_url=https://imagenzac.com.mx/feed/';

    function cargarNoticias() {
        fetch(rssApiUrl)
            .then(response => {
                if (!response.ok) throw new Error('Error en el servidor de RSS');
                return response.json();
            })
            .then(data => {
                if (data.status === 'ok' && data.items.length > 0) {
                    // Extraemos solo los títulos de las noticias
                    let titulos = data.items.map(item => item.title);
                    
                    const separador = " &nbsp;&nbsp;&nbsp; | &nbsp;&nbsp;&nbsp; ";
                    document.getElementById('noticias').innerHTML = titulos.join(separador) + separador;
                } else {
                    document.getElementById('noticias').innerHTML = "No se encontraron noticias en el Feed en este momento.";
                }
            })
            .catch(error => {
                document.getElementById('noticias').innerHTML = "Fallo de actualización: " + error.message;
            });
    }

    // Cargar al inicio y actualizar cada 5 minutos
    cargarNoticias();
    setInterval(cargarNoticias, 300000);
</script>

</body>
</html>
